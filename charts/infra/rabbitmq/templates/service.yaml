apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: {{ .Values.namespace }}
  labels:
    app: rabbitmq
    tier: data

spec:
  type: ClusterIP

  selector:
    app: rabbitmq

  ports:
    - name: amqp
      port: {{ .Values.rabbitmq.ports.amqp }}
      targetPort: {{ .Values.rabbitmq.ports.amqp }}

    - name: management
      port: {{ .Values.rabbitmq.ports.management }}
      targetPort: {{ .Values.rabbitmq.ports.management }}

    - name: metrics
      port: {{ .Values.rabbitmq.ports.metrics }}
      targetPort: {{ .Values.rabbitmq.ports.metrics }}