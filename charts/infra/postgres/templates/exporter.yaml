{{- if .Values.exporter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: {{ .Values.namespace }}

spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter

  template:
    metadata:
      labels:
        app: postgres-exporter

    spec:
      containers:
        - name: postgres-exporter
          image: {{ .Values.exporter.image }}

          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.exporter.secretName }}
                  key: {{ .Values.exporter.dsnKey }}

          ports:
            - containerPort: 9187
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres-exporter
    tier: monitoring

spec:
  selector:
    app: postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187
{{- end }}