{{- if .Values.exporter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch-exporter
  namespace: {{ .Values.namespace }}

spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch-exporter

  template:
    metadata:
      labels:
        app: elasticsearch-exporter

    spec:
      containers:
        - name: elasticsearch-exporter
          image: {{ .Values.exporter.image }}

          args:
            - --es.uri=http://elasticsearch:9200
            - --es.all

          ports:
            - containerPort: 9114

---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-exporter
  namespace: {{ .Values.namespace }}
  labels:
    app: elasticsearch-exporter
    tier: monitoring

spec:
  selector:
    app: elasticsearch-exporter
  ports:
    - name: metrics
      port: 9114
      targetPort: 9114
{{- end }}