apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: {{ .Values.namespace }}

spec:
  serviceName: mongodb-headless
  replicas: {{ .Values.mongodb.replicas }}

  selector:
    matchLabels:
      app: mongodb

  template:
    metadata:
      labels:
        app: mongodb

    spec:
      securityContext:
        fsGroup: 999

      containers:
        - name: mongodb
          image: {{ .Values.mongodb.image }}

          securityContext:
            runAsNonRoot: true
            runAsUser: 999

          ports:
            - containerPort: 27017

          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mongodb.auth.secretName }}
                  key: {{ .Values.mongodb.auth.usernameKey }}

            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mongodb.auth.secretName }}
                  key: {{ .Values.mongodb.auth.passwordKey }}

          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 25
            failureThreshold: 15

          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 25
            failureThreshold: 15

          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db

          resources:
            {{- toYaml .Values.mongodb.resources | nindent 12 }}

  volumeClaimTemplates:
    - metadata:
        name: mongodb-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.mongodb.persistence.storageClass }}
        storageClassName: {{ .Values.mongodb.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.mongodb.persistence.size }}