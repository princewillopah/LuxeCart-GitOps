{{- if .Values.pdb.enabled }}
{{- range $name, $svc := .Values.services }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
spec:
  minAvailable: {{ $.Values.pdb.minAvailable }}
  selector:
    matchLabels:
      app: {{ $name }}
---
{{- end }}
{{- end }}