{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.frontend.name }}
  namespace: {{ .Values.namespaceFrontend }}
  labels:
    app: {{ .Values.frontend.name }}

spec:
  type: {{ .Values.frontend.service.type }}

  selector:
    app: {{ .Values.frontend.name }}

  ports:
    {{- range .Values.frontend.ports }}
    - name: {{ .name }}
      port: {{ .servicePort }}
      targetPort: {{ .containerPort }}
    {{- end }}
{{- end }}