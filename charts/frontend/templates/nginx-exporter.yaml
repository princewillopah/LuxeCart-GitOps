apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-exporter
  namespace: luxe-frontend
  labels:
    app: nginx-exporter

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx-exporter

  template:
    metadata:
      labels:
        app: nginx-exporter

    spec:
      containers:

      - name: nginx-exporter
        image: nginx/nginx-prometheus-exporter:0.11

        args:
        - -nginx.scrape-uri=http://frontend:8081/stub_status

        ports:
        - containerPort: 9113

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi