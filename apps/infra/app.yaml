apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: luxecart-infra
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" # Ensure infra resources are applied before backend and frontend
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: luxe-infra
  source:
    repoURL: git@github.com:princewillopah/LuxeCart-GitOps.git
    targetRevision: main
    path: charts/infra
    helm:
      valueFiles:
        - ../../environments/dev/infra/values.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # - CreateNamespace=true
      - PruneLast=true # Optional: prune resources last