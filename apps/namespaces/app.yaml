apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: luxecart-namespaces
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/YOUR_REPO/LuxeCart-GitOps
    targetRevision: HEAD
    path: apps/namespaces

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true