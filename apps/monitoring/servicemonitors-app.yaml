apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: luxecart-servicemonitors
  namespace: argocd
spec:
  project: default

  source:
    repoURL: git@github.com:princewillopah/LuxeCart-GitOps.git
    targetRevision: main
    path: apps/monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: luxe-observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true