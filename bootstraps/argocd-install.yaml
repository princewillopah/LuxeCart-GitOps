apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: luxecart-apps
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/princewillopah/LuxeCart-GitOps.git
    targetRevision: main
    path: apps   # 👈 argocd will scan this folder
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # syncOptions:
    #   - CreateNamespace=true